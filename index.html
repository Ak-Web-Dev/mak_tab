<!doctype html>
<html lang="en">
  <head>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/src/style.css">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2B3035" />
    <link rel="shortcut icon" href="/src/assets/logo.png" type="image/x-icon">
    <title>MAK Tab</title>
  </head>
  <body>
    <div id="app"></div>
    <div class="alert alert-dark" data-bs-theme="dark" role="alert">
      <h3>What's on Your Mind Today?</h3>
      <h6><span id="clock">00:00</span> | <span id="weather-data">Loading location...</span></h6>
      <form class="d-flex" role="search" action="https://www.google.com/search" method="GET">
        <input class="form-control me-2 fm" data-bs-theme="dark" type="search" placeholder="Search Google" aria-label="Search" name="q"/>
        <button class="btn btn-success form-button" type="submit">Search</button>
      </form><hr />

      <a class="btn btn-primary btn2" data-bs-toggle="collapse" href="#tools" role="button" aria-expanded="false" aria-controls="tools">⚙️ Tools</a>
      <a class="btn btn-primary btn2" data-bs-toggle="collapse" href="#nasa" role="button" aria-expanded="false" aria-controls="nasa">NASA Image Info</a>
      <a class="btn btn-outline-light btn2">Github</a>
      <div class="collapse" id="tools">
        <div class="d-flex flex-row flex-wrap gap-2 p-3 tools">

          <div class="card" style="width: 18rem;"  data-bs-theme="dark">
          <div class="card-body">
              <h5 class="card-title">Calculator</h5>
              <input type="number" class="display form-control" placeholder="First Number Here" id="num1"/><br />
              <input type="number" class="display form-control" placeholder="Second Number Here" id="num2"/><br />
              <button class="btn btn-primary calc" onclick="calculate('+')">+</button>
              <button class="btn btn-primary calc" onclick="calculate('-')">-</button>
              <button class="btn btn-primary calc" onclick="calculate('*')">x</button>
              <button class="btn btn-primary calc" onclick="calculate('/')">/</button>
              <p id="calcResult"></p>
          </div>
          </div>
          <div class="card" style="width: 18rem;"  data-bs-theme="dark">
          <div class="card-body">
              <h5 class="card-title">Web Shortcuts</h5>
              <div class="input-group mb-2">
              <input type="text" id="url1" class="form-control" value="https://wikipedia.org" style="margin-bottom: 0 !important;">
              <button class="btn btn-primary" onclick="updateBrowserUrl()">Go</button>
              </div>
          </div>
          </div>

        </div>
      </div>

      <div class="collapse" id="nasa"><br />
        
      </div>

    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
    <script type="module" src="/src/main.js"></script>
    <script>
      function calculate(op) {
          let num1 = parseFloat(document.getElementById('num1').value);
          let num2 = parseFloat(document.getElementById('num2').value);
          let result;
          if (op === '+') result = num1 + num2;
          else if (op === '-') result = num1 - num2;
          else if (op === '*') result = num1 * num2;
          else if (op === '/') result = num1 / num2;
          document.getElementById('calcResult').innerText = 'Result: ' + result;
      }

      function updateClock() {
        const now = new Date();
        const options = {
          hour: '2-digit',
          minute: '2-digit',
          hour12: true
        };
        const timeString = now.toLocaleTimeString([], options);
        document.getElementById('clock').textContent = timeString;
      }
      updateClock();
      setInterval(updateClock, 1000);

      function getLocalWeather() {
        const display = document.getElementById('weather-data');
        if (!navigator.geolocation) {
          alert("Geolocation is not supported by your browser for local weather data.");
          return;
        }
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            try {
              const [weatherResponse, geoResponse] = await Promise.all([
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m`),
                fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
              ]);
              
              if (!weatherResponse.ok || !geoResponse.ok) throw new Error("Weather or Geo service error");
              
              const weatherdata = await weatherResponse.json();
              const geodata = await geoResponse.json();
              
              const temp = weatherdata.current.temperature_2m;
              const unit = weatherdata.current_units.temperature_2m;
              const address = geodata.address;
              const cityName = address.city || address.town || address.municipality || "Unknown City";

              display.textContent = `${temp}${unit} (${cityName})`;

            } catch (error) {
              display.textContent = `Unable to retrieve weather data.`;
              console.error(error);
            }
          },
          (error) => {
            if(error.code === error.PERMISSION_DENIED) {
              alert("Location access was denied, unable to load weather data.");
            }
            else {
              alert("Couldn't determine your location, unable to load weather data. Check your device's GPS settings.");
            }
          }
        );
      }
      window.addEventListener('DOMContentLoaded', getLocalWeather);
    </script>
  </body>
</html>
